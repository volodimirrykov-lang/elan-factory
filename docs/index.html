<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELAN Factory · Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="style-themes.css">
<script src="theme.js"></script>
</head>
<body>
<header>
  <a class="logo" href="index.html"><em>elan</em> factory</a>
  <nav>
    <a href="index.html" class="active">Cockpit</a>
    <a href="pnl.html">P&amp;L</a>
    <a href="clients.html">Клиенты</a>
    <a href="products.html">Продукты</a>
    <a href="capex.html">CAPEX</a>
    <a href="cashflow.html">Cash</a>
    <a href="path.html">Путь к $1B</a>
    <a href="brain.html">Brain</a>
  </nav>
  <span class="pill-date" id="headerDate"></span>
</header>

<main>
  <h1>Cockpit</h1>
  <p class="subtitle" id="subtitle"></p>

  <!-- KPI Grid -->
  <div class="grid grid-4" id="kpis"></div>

  <h2>Динамика месяц к месяцу</h2>
  <div class="card">
    <div class="chart-wrap tall"><canvas id="revChart"></canvas></div>
  </div>

  <div class="grid grid-2" style="margin-top: var(--space-4)">
    <div class="card">
      <h3>Сравнение месяцев</h3>
      <table id="monthsTable">
        <thead><tr>
          <th>Месяц</th>
          <th class="num">Revenue</th>
          <th class="num">OpEx</th>
          <th class="num">Op P&amp;L</th>
          <th class="num">Margin</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="card">
      <h3>Кассовые позиции — конец марта</h3>
      <table id="cashTable">
        <thead><tr>
          <th>Счёт</th>
          <th>Валюта</th>
          <th class="num">Баланс</th>
          <th class="num">€ эквив.</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <h2>Путь к миллиарду</h2>
  <div class="card">
    <div id="pathBar"></div>
    <div class="grid grid-4" id="scenarioCards" style="margin-top: var(--space-6)"></div>
  </div>

  <h2>Ключевые инсайты</h2>
  <div id="insights"></div>
</main>

<footer>
  <div>ELAN Factory · Cockpit</div>
  <div>обновлено <span id="updated"></span></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="chart-theme.js"></script>
<script src="data.js"></script>
<script>
const D = window.ELAN_DATA;
const fmt = window.fmtNum;
const fmtPct = window.fmtPct;

document.getElementById('headerDate').textContent = D.meta.lastUpdate;
document.getElementById('updated').textContent = D.meta.lastUpdate;
document.getElementById('subtitle').textContent =
  `Финансовый обзор группы ELAN — завод в Турции, собственный бренд (запуск май 2026). Цель: продать за $1B за ${D.meta.targetYears.join('–')} лет. Доля 7%.`;

const latest = D.months[D.months.length - 1];
const ytdRevenue = D.months.reduce((s, m) => s + m.revenue, 0);
const ytdOpProfit = D.months.reduce((s, m) => s + m.opProfit, 0);

// ============ KPIs ============
const kpis = [
  { label: 'Выручка · Март', value: fmt(latest.revenue), sub: 'восстановление после переезда' },
  { label: 'YTD Revenue 2026', value: fmt(ytdRevenue), sub: `за ${D.months.length} мес. (фев + мар)` },
  {
    label: 'Operating P&L · Март',
    value: fmt(latest.opProfit),
    sub: `Margin ${fmtPct(latest.opMargin)}`,
    cls: latest.opProfit >= 0 ? 'pos' : 'neg',
  },
  {
    label: 'CAPEX потрачено',
    value: '$' + (D.capex.spent / 1000).toFixed(0) + 'k',
    sub: `из $${D.capex.budget / 1000}k бюджета`,
  },
  {
    label: 'Вливания учредителей',
    value: fmt(latest.founderInjection),
    sub: `${fmtPct(latest.founderInjection / latest.cashIn)} поступлений`,
    cls: 'warn',
  },
  { label: 'Инвентарь · Март', value: fmt(D.inventory.total), sub: 'готовая + сырьё + упаковка' },
  {
    label: 'Оценка группы',
    value: '$' + (D.valuation.totalLow / 1e6).toFixed(0) + '–' + (D.valuation.totalHigh / 1e6).toFixed(0) + 'M',
    sub: `Ваши 7%: $${(D.valuation.userShare7pct.low / 1000).toFixed(0)}–${(D.valuation.userShare7pct.high / 1000).toFixed(0)}k`,
  },
  {
    label: 'Цель 2030–2032',
    value: '$1B',
    sub: 'Ваши 7% = $70M',
    cls: 'warn',
  },
];
document.getElementById('kpis').innerHTML = kpis.map(k => `
  <div class="kpi">
    <div class="label">${k.label}</div>
    <div class="value ${k.cls || ''}">${k.value}</div>
    <div class="sub">${k.sub}</div>
  </div>`).join('');

// ============ Revenue Chart ============
new Chart(document.getElementById('revChart'), {
  type: 'bar',
  data: {
    labels: D.months.map(m => m.label),
    datasets: [
      { label: 'Выручка',         data: D.months.map(m => m.revenue),                     backgroundColor: CHART_COLORS[0] },
      { label: 'OpEx',            data: D.months.map(m => m.cogs.total + m.opex.total),   backgroundColor: CHART_COLORS[2] },
      { label: 'CAPEX',           data: D.months.map(m => m.capex),                       backgroundColor: CHART_COLORS[3] },
      { label: 'Учредители',      data: D.months.map(m => m.founderInjection),            backgroundColor: CHART_COLORS[1] },
    ],
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.raw)}` } },
    },
    scales: {
      x: { grid: { display: false } },
      y: { ticks: { callback: v => fmt(v) } },
    },
  },
});

// ============ Months table ============
document.querySelector('#monthsTable tbody').innerHTML = D.months.map(m => {
  const opex = m.cogs.total + m.opex.total;
  const statusPill = m.status === 'moving'
    ? '<span class="pill red">переезд</span>'
    : m.status === 'recovery' ? '<span class="pill amber">восстановление</span>'
    : '<span class="pill green">норма</span>';
  return `<tr>
    <td>${m.label} ${statusPill}</td>
    <td class="num">${fmt(m.revenue)}</td>
    <td class="num">${fmt(opex)}</td>
    <td class="num ${m.opProfit >= 0 ? 'pos' : 'neg'}">${fmt(m.opProfit)}</td>
    <td class="num ${m.opProfit >= 0 ? 'pos' : 'neg'}">${fmtPct(m.opMargin)}</td>
  </tr>`;
}).join('');

// ============ Cash positions ============
document.querySelector('#cashTable tbody').innerHTML = D.cashPositions.map(p => `
  <tr>
    <td>${p.account}</td>
    <td><span class="pill">${p.currency}</span></td>
    <td class="num">${p.balance.toLocaleString('ru-RU', { maximumFractionDigits: 0 })}</td>
    <td class="num">${p.eurEquiv.toLocaleString('ru-RU', { maximumFractionDigits: 0 })}</td>
  </tr>`).join('');
const totalCashEur = D.cashPositions.reduce((s, p) => s + p.eurEquiv, 0);
document.querySelector('#cashTable tbody').innerHTML += `
  <tr style="font-weight:600;border-top:1px solid var(--border)">
    <td>ИТОГО</td><td></td><td class="num"></td><td class="num">${fmt(totalCashEur)}</td>
  </tr>`;

// ============ Path to $1B ============
const pctToTarget = (D.valuation.totalHigh / D.meta.targetValuation) * 100;
document.getElementById('pathBar').innerHTML = `
  <div style="display:flex; justify-content:space-between; color:var(--text-dim); font-size:12px; margin-bottom: 8px">
    <span>сегодня · $${(D.valuation.totalHigh / 1e6).toFixed(0)}M</span>
    <span>цель 2030–2032 · $1B</span>
  </div>
  <div class="bar" style="height: 10px"><div style="width: ${pctToTarget.toFixed(1)}%"></div></div>
  <div style="font-size:12px; color:var(--text-dim); margin-top: 10px">
    Пройдено ${pctToTarget.toFixed(1)}% · осталось ×${(D.meta.targetValuation / D.valuation.totalHigh).toFixed(0)} роста
  </div>`;

document.getElementById('scenarioCards').innerHTML = Object.values(D.scenarios).map(s => `
  <div class="kpi">
    <div class="label">${s.name}</div>
    <div class="value">$${(s.exitValue / 1e6).toFixed(0)}M</div>
    <div class="sub">вероятность ${fmtPct(s.probability, 0)} · ваш 7% = $${(s.exitValue * 0.07 / 1e6).toFixed(1)}M</div>
  </div>`).join('');

// ============ Insights ============
document.getElementById('insights').innerHTML = `
  <div class="callout">
    <strong>Февраль → Март — восстановление.</strong> Выручка выросла с €4k до €111k после завершения переезда. Маржа ещё отрицательная из-за бэклога таможни (€54k в марте).
  </div>
  <div class="callout amber">
    <strong>Главный якорь расходов — таможня при импорте.</strong> В марте €54k = 49% выручки. Режим IPR (İhracat Rejimi) может срезать до 40% COGS в пиковые месяцы.
  </div>
  <div class="callout red">
    <strong>60% выручки — связанные стороны.</strong> ФОП Кравченко + ELAN BEAUTY Польша + ELAN COSMETICS Дубаи. Инвестор увидит это как риск концентрации. Цель: &lt;30% related-party к DD.
  </div>
  <div class="callout green">
    <strong>Собственный бренд — в мае 2026.</strong> Шампунь + гель для душа. Ключевой value-driver. В течение 6 мес после запуска нужно показать traction — это откроет DTC multiple (3–6× revenue).
  </div>`;
</script>
</body>
</html>
